<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Linhas Horizontais | Tomás Mota Photography</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="../assets/styles/proj.css" />
</head>
<body>
  <div class="cursor"      id="cursor"></div>
  <div class="cursor-ring" id="cursor-ring"></div>

  <!-- ══ HEADER ══ -->
  <header class="site-header" id="site-header-bar">
    <a href="../" class="site-logo">
      <span class="logo-main">Tomás Mota</span>
      <span class="logo-sub">Photography</span>
    </a>
    <nav class="site-nav" id="site-nav">
      <a href="../#projetos" class="nav-link active">Fotografia</a>
      <a href="../#sobre"    class="nav-link">Sobre</a>
      <a href="../#contacto" class="nav-link">Contacto</a>
    </nav>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <span></span><span></span>
    </button>
  </header>

  <!-- ══ HERO ══ -->
  <section class="project-hero">
  <div class="hero-bg-img"><img id="hero-img" src="../assets/images/portfolio/linhas-horizontais/IMG_8927.jpg" alt="" /></div>
    <div class="hero-dark"></div>
    <div class="hero-grain"></div>
    <div class="hero-fade"></div>
    <div class="hero-info">
      <h1 class="project-title" id="proj-title"></h1>
      <div class="hero-desc-row">
        <div class="project-meta">
          <div><p class="meta-label">Categoria</p><p class="meta-value" id="proj-cat"></p></div>
          <div><p class="meta-label">Ano</p><p class="meta-value" id="proj-year"></p></div>
          <div><p class="meta-label">Imagens</p><p class="meta-value" id="proj-count"></p></div>
        </div>
        <p class="project-desc-hero" id="proj-desc"></p>
      </div>
    </div>
  </section>

  <!-- ══ GALLERY ══ -->
  <section class="gallery-section reveal">
    <div class="gallery-header">
      <p class="gallery-label">Galeria do Projeto</p>
      <p class="gallery-count" id="gallery-count-display"></p>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>

  <!-- ══ FOOTER ══ -->
  <footer class="site-footer">
    <a href="https://makyneta.github.io" target="_blank" rel="noopener" style="text-decoration: none;">
      <p class="footer-copy">Copyright © <span id="footer-year"></span> Makyneta Unipessoal, Lda. Todos os direitos reservados.</p>
    </a>
  </footer>

  <!-- ══ LIGHTBOX ══ -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lb-close" id="lb-close" aria-label="Fechar">✕</button>
    <button class="lb-arrow lb-prev" id="lb-prev" aria-label="Anterior">←</button>
    <button class="lb-arrow lb-next" id="lb-next" aria-label="Próxima">→</button>
    <div class="lb-inner">
      <div class="lb-img-wrap">
        <img id="lb-img" src="" alt="" />
      </div>
      <aside class="lb-info">
        <h2 class="lb-photo-name" id="lb-name"></h2>
        <div class="lb-exif">
          <div class="lb-exif-row">
            <span class="lb-exif-label">ISO</span>
            <span class="lb-exif-value" id="lb-iso"></span>
            <div class="lb-level-bar"><div class="lb-level-fill" id="lb-iso-fill"></div></div>
          </div>
          <div class="lb-exif-row">
            <span class="lb-exif-label">Diafragma</span>
            <span class="lb-exif-value" id="lb-aperture"></span>
            <div class="lb-level-bar"><div class="lb-level-fill" id="lb-aperture-fill"></div></div>
          </div>
          <div class="lb-exif-row">
            <span class="lb-exif-label">Obturador</span>
            <span class="lb-exif-value" id="lb-shutter"></span>
            <div class="lb-level-bar"><div class="lb-level-fill" id="lb-shutter-fill"></div></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       DADOS DO PROJETO — edita só aqui
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const PROJECT = {
      title:    'Linhas Horizontais',
      cat:      'Linhas Horizontais',
      year:     '2026',
      desc:     '',   /* ← texto opcional no hero */
      basePath: '../assets/images/portfolio/linhas-horizontais/',
      photos: [
        {
          file:     'IMG_8888.jpg',
          name:     'Em Direção À Vitório',
          iso:      { value: 'ISO 100' },
          aperture: { value: 'f / 22' },
          shutter:  { value: '1,20' },
        },
        {
          file:     'IMG_8889.jpg',
          name:     'Em Direção À Vitório ',
          iso:      { value: 'ISO 100' },
          aperture: { value: 'f / 22' },
          shutter:  { value: '1,20' },
        },
        {
          file:     'IMG_8927.jpg',
          name:     'As Escadas Para O Sucesso',
          iso:      { value: 'ISO 100' },
          aperture: { value: 'f / 22' },
          shutter:  { value: '1,20' },
        },
      ],
    };
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

    /* ── FOOTER ANO ── */
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    /* ── CURSOR ── */
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('cursor-ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove', e => {
      mx=e.clientX; my=e.clientY;
      cursor.style.left=mx+'px'; cursor.style.top=my+'px';
    });
    (function loop() {
      rx+=(mx-rx)*.12; ry+=(my-ry)*.12;
      ring.style.left=rx+'px'; ring.style.top=ry+'px';
      requestAnimationFrame(loop);
    })();
    function bindCursor(el) {
      el.addEventListener('mouseenter', () => { cursor.style.width='18px';cursor.style.height='18px';ring.style.width='56px';ring.style.height='56px'; });
      el.addEventListener('mouseleave', () => { cursor.style.width='10px';cursor.style.height='10px';ring.style.width='36px';ring.style.height='36px'; });
    }
    document.querySelectorAll('a,button').forEach(bindCursor);

    /* ── HEADER SCROLL ── */
    const headerBar = document.getElementById('site-header-bar');
    window.addEventListener('scroll', () => {
      headerBar.classList.toggle('scrolled', window.scrollY > 60);
    }, { passive: true });

    /* ── MOBILE MENU ── */
    const navToggle = document.getElementById('nav-toggle');
    const siteNav   = document.getElementById('site-nav');
    navToggle.addEventListener('click', () => {
      siteNav.classList.toggle('open');
      navToggle.classList.toggle('open');
    });

    /* ── SCROLL REVEAL ── */
    const revObs = new IntersectionObserver(entries => {
      entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); revObs.unobserve(e.target); } });
    }, { threshold: .08 });
    document.querySelectorAll('.reveal').forEach(el => revObs.observe(el));

    /* ── PREENCHE META ── */
    document.title = PROJECT.title + ' · Photography';
    document.getElementById('proj-title').textContent = PROJECT.title;
    document.getElementById('proj-cat').textContent   = PROJECT.cat;
    document.getElementById('proj-year').textContent  = PROJECT.year;
    document.getElementById('proj-count').textContent = PROJECT.photos.length + ' fotografias';
    document.getElementById('gallery-count-display').textContent = PROJECT.photos.length;
    document.getElementById('proj-desc').textContent  = PROJECT.desc || '';

    /* ── GALERIA ── */
    const grid    = document.getElementById('gallery-grid');
    const itemObs = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if(entry.isIntersecting){ entry.target.classList.add('revealed'); itemObs.unobserve(entry.target); }
      });
    }, { threshold: 0.04, rootMargin: '0px 0px -30px 0px' });

    PROJECT.photos.forEach((photo, idx) => {
      const item = document.createElement('div');
      item.className   = 'gallery-item';
      item.dataset.idx = idx;
      const img = document.createElement('img');
      img.alt     = photo.name;
      img.src     = PROJECT.basePath + photo.file;
      img.onload  = () => itemObs.observe(item);
      img.onerror = () => { item.style.minHeight='220px'; itemObs.observe(item); };
      item.appendChild(img);
      grid.appendChild(item);
      bindCursor(item);
      item.addEventListener('click', () => openLightbox(idx));
    });

    /* ══════════════ LIGHTBOX */
    const lb         = document.getElementById('lightbox');
    const lbImg      = document.getElementById('lb-img');
    const lbName     = document.getElementById('lb-name');
    const lbISO      = document.getElementById('lb-iso');
    const lbAperture = document.getElementById('lb-aperture');
    const lbShutter  = document.getElementById('lb-shutter');
    const lbISOFill  = document.getElementById('lb-iso-fill');
    const lbAFill    = document.getElementById('lb-aperture-fill');
    const lbSFill    = document.getElementById('lb-shutter-fill');
    const lbClose    = document.getElementById('lb-close');
    const lbPrev     = document.getElementById('lb-prev');
    const lbNext     = document.getElementById('lb-next');

    let currentIdx = 0;

    function openLightbox(idx) {
      currentIdx = idx;
      loadPhoto(idx);
      lb.classList.add('active');
      document.body.classList.add('lb-open');
    }

    function closeLightbox() {
      lb.classList.remove('active');
      document.body.classList.remove('lb-open');
      setTimeout(() => {
        lbISOFill.style.width = '0%';
        lbAFill.style.width   = '0%';
        lbSFill.style.width   = '0%';
      }, 450);
    }

    function loadPhoto(idx) {
      const p = PROJECT.photos[idx];
      lbImg.src          = PROJECT.basePath + p.file;
      lbImg.alt          = p.name;
      lbName.textContent = p.name;
      lbISO.textContent      = p.iso.value;
      lbAperture.textContent = p.aperture.value;
      lbShutter.textContent  = p.shutter.value;

      lbISOFill.style.width = '0%';
      lbAFill.style.width   = '0%';
      lbSFill.style.width   = '0%';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        lbISOFill.style.width = p.iso.level      + '%';
        lbAFill.style.width   = p.aperture.level + '%';
        lbSFill.style.width   = p.shutter.level  + '%';
      }));

      const show = PROJECT.photos.length > 1;
      lbPrev.style.display = show ? '' : 'none';
      lbNext.style.display = show ? '' : 'none';
    }

    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', () => { currentIdx=(currentIdx-1+PROJECT.photos.length)%PROJECT.photos.length; loadPhoto(currentIdx); });
    lbNext.addEventListener('click', () => { currentIdx=(currentIdx+1)%PROJECT.photos.length; loadPhoto(currentIdx); });
    lb.addEventListener('click', e => { if(e.target===lb) closeLightbox(); });
    document.addEventListener('keydown', e => {
      if(!lb.classList.contains('active')) return;
      if(e.key==='Escape')     closeLightbox();
      if(e.key==='ArrowLeft')  { currentIdx=(currentIdx-1+PROJECT.photos.length)%PROJECT.photos.length; loadPhoto(currentIdx); }
      if(e.key==='ArrowRight') { currentIdx=(currentIdx+1)%PROJECT.photos.length; loadPhoto(currentIdx); }
    });
  </script>
</body>
</html>
